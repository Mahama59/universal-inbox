<!DOCTYPE html>
<html>
<head>
    <title>Universal Inbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📬 Universal Inbox</h1>
    <p>All your messages in one place</p>
</header>


<section class="search">
    <input type="text" placeholder="Search messages...">
</section>


<section class="inbox">

    <div class="message">
        <h3>📧 Gmail</h3>
        <p><b>John:</b> Meeting reminder tomorrow</p>
        <small>10:30 AM</small>
    </div>


    <div class="message">
        <h3>💬 Slack</h3>
        <p><b>Team:</b> New project update available</p>
        <small>9:15 AM</small>
    </div>


    <div class="message">
        <h3>📌 Tasks</h3>
        <p><b>Reminder:</b> Finish presentation</p>
        <small>Yesterday</small>
    </div>

</section>


<footer>
    <p>Universal Inbox © 2026</p>
</footer>


</body>
</html>
